# Top-level config = production (deployed with `wrangler deploy`)
# Staging config below = `wrangler deploy --env staging`

name = "sales-bot"
main = "src/index.js"
compatibility_date = "2024-01-01"
account_id = "444afb7987a4f1e657e0bad22a528a42"

[[kv_namespaces]]
binding = "MEMORY_STORE"
id = "34e52c784a4e4e40925b93b17354cbec"

[vars]
ENVIRONMENT = "production"
SUPABASE_URL = "https://rydkwsjwlgnivlwlvqku.supabase.co"

# Priority 3 (2026-05-12): hourly cron trigger for T+20h auto follow-up.
# Schedule is UTC. The scheduled() handler in src/index.js runs the
# follow-up logic. Staging overrides this to crons=[] below so the
# handler exists in the code but does not fire automatically; we test
# in staging via GET /__cron-test (gated by ENVIRONMENT=staging).
[triggers]
crons = ["0 * * * *"]


# ----------------------------------------------------------------------
# STAGING ENVIRONMENT
# ----------------------------------------------------------------------
# Deployed with: wrangler deploy --env staging
# Worker URL:    https://sales-bot-staging.nellakuate.workers.dev
# Uses a separate KV namespace and (after secrets are set) separate
# Supabase + Anthropic credentials. Production is unaffected.
# ----------------------------------------------------------------------

[env.staging]
name = "sales-bot-staging"

[[env.staging.kv_namespaces]]
binding = "MEMORY_STORE"
id = "e1bc76417c284a3ebd82758623e1d148"

[env.staging.vars]
ENVIRONMENT = "staging"
SUPABASE_URL = "https://hlpucysbaqerhwahfolg.supabase.co"

# Staging: cron handler present in code, schedule explicitly disabled.
# Manual invocation via GET https://sales-bot-staging.nellakuate.workers.dev/__cron-test
[env.staging.triggers]
crons = []